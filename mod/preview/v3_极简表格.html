<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Microsoft YaHei',sans-serif;display:flex;justify-content:center;padding:40px}
.wrap{width:640px;background:#fff;border:1px solid #d4d4d8;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.hd{background:#18181b;color:#fff;text-align:center;padding:22px;font-size:30px;font-weight:900;letter-spacing:8px;display:flex;align-items:center;justify-content:center;gap:10px}
.hd .dot{width:8px;height:8px;background:#22c55e;border-radius:50%}
.bd{padding:12px 24px 0}
.row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid #f4f4f5;gap:12px}
.row:last-child{border-bottom:none}
.icon{width:40px;height:40px;flex-shrink:0;border-radius:4px;background:#f4f4f5}
.mid{flex:1;min-width:0}
.top2{display:flex;justify-content:space-between;align-items:baseline}
.nm{font-size:16px;font-weight:700;color:#18181b}
.nn{font-size:13px;color:#71717a}
.pbar{height:14px;background:#f4f4f5;border-radius:7px;overflow:hidden;position:relative;margin-top:4px}
.pf{height:100%;border-radius:7px}
.g1{background:#22c55e} .g2{background:#eab308} .g3{background:#3b82f6} .g4{background:#ef4444}
.pl{position:absolute;top:0;left:50%;transform:translateX(-50%);line-height:14px;font-size:10px;color:#fff;font-weight:700}
.btm{padding:14px 24px 20px;display:flex;justify-content:space-between;color:#a1a1aa;font-size:13px}
.total{font-weight:600;color:#3f3f46}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd"><span class="dot"></span>物品容量<span class="dot"></span></div>
  <div class="bd">
    <div class="row">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/carrot.png" onerror="this.style.background='#e0e0e0'">
      <div class="mid">
        <div class="top2"><span class="nm">胡萝卜</span><span class="nn">3,840个 (2盒+384) &nbsp; 占用60格</span></div>
        <div class="pbar"><div class="pf g1" style="width:1.85%"></div><div class="pl">1.85%</div></div>
      </div>
    </div>
    <div class="row">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/diamond.png" onerror="this.style.background='#e0e0e0'">
      <div class="mid">
        <div class="top2"><span class="nm">钻石</span><span class="nn">756个 &nbsp; 占用12格</span></div>
        <div class="pbar"><div class="pf g2" style="width:0.36%"></div><div class="pl">0.36%</div></div>
      </div>
    </div>
    <div class="row">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/iron_ingot.png" onerror="this.style.background='#e0e0e0'">
      <div class="mid">
        <div class="top2"><span class="nm">铁锭</span><span class="nn">12,544个 (7盒+448) &nbsp; 占用196格</span></div>
        <div class="pbar"><div class="pf g3" style="width:6.05%"></div><div class="pl">6.05%</div></div>
      </div>
    </div>
    <div class="row">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/gold_ingot.png" onerror="this.style.background='#e0e0e0'">
      <div class="mid">
        <div class="top2"><span class="nm">金锭</span><span class="nn">2,560个 (1盒+832) &nbsp; 占用40格</span></div>
        <div class="pbar"><div class="pf g4" style="width:1.23%"></div><div class="pl">1.23%</div></div>
      </div>
    </div>
  </div>
  <div class="btm">
    <span>QQScan · 扫描 #胡萝卜</span>
    <span class="total">120容器 · 3,240格 · 耗时1.2s</span>
  </div>
</div>
</body>
</html>
