<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Microsoft YaHei',sans-serif;padding:40px;display:flex;justify-content:center}
.card{width:680px;background:#fff;border:1px solid #d4d4d8;border-radius:12px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.head{background:#18181b;color:#fff;text-align:center;padding:18px;font-size:26px;font-weight:900;letter-spacing:8px}
.head span{color:#22c55e;margin:0 8px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;padding:12px}
.cell{text-align:center;padding:8px 2px;background:#fafafa;border-radius:6px}
.icon{width:36px;height:36px;margin:0 auto 4px;display:block;image-rendering:pixelated;border-radius:3px}
.name{font-size:11px;font-weight:700;color:#3f3f46;line-height:1.2}
.count{font-size:10px;color:#71717a;margin-top:1px;line-height:1.3}
.footer{text-align:center;padding:8px 20px 14px;color:#a1a1aa;font-size:12px;border-top:1px solid #f4f4f5}
.footer b{color:#52525b}
</style>
</head>
<body>
<div class="card">
  <div class="head"><span>⬤</span>物品种类及数量<span>⬤</span></div>
  <div class="grid">
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/carrot.png"><div class="name">胡萝卜</div><div class="count">3,840个<br>2盒+384</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/iron_ingot.png"><div class="name">铁锭</div><div class="count">12,544个<br>7盒+448</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/diamond.png"><div class="name">钻石</div><div class="count">756个</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/gold_ingot.png"><div class="name">金锭</div><div class="count">2,560个<br>1盒+832</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/emerald.png"><div class="name">绿宝石</div><div class="count">128个</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/redstone.png"><div class="name">红石粉</div><div class="count">4,800个<br>2盒+1344</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/lapis_lazuli.png"><div class="name">青金石</div><div class="count">640个</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/cobblestone.png"><div class="name">圆石</div><div class="count">23,040个<br>13盒+576</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/oak_log.png"><div class="name">橡木原木</div><div class="count">8,640个<br>5盒</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/ender_pearl.png"><div class="name">末影珍珠</div><div class="count">432个<br>1盒</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/coal.png"><div class="name">煤炭</div><div class="count">5,184个<br>3盒</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/netherite_ingot.png"><div class="name">下界合金锭</div><div class="count">48个</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/copper_ingot.png"><div class="name">铜锭</div><div class="count">1,920个<br>1盒+192</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/quartz.png"><div class="name">下界石英</div><div class="count">2,304个<br>1盒+576</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/amethyst_shard.png"><div class="name">紫水晶碎片</div><div class="count">320个</div></div>
    <div class="cell"><img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/slime_ball.png"><div class="name">粘液球</div><div class="count">180个</div></div>
  </div>
  <div class="footer">QQScan · 扫描 <b>#仓库</b> · <b>120</b>容器 · 耗时<b>1.2</b>s</div>
</div>
</body>
</html>
