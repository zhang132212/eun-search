<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Microsoft YaHei',sans-serif;display:flex;justify-content:center;padding:40px}
.card{width:620px;background:#fff;border:2px solid #e0e0e0;border-radius:16px;overflow:hidden}
.head{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;text-align:center;padding:20px;font-size:28px;font-weight:bold;letter-spacing:6px}
.body{padding:20px 28px;display:flex;flex-direction:column;gap:14px}
.block{display:flex;align-items:center;gap:14px;padding:16px 18px;background:#f1f5f9;border-radius:10px;border-left:4px solid #6366f1}
.icon{width:48px;height:48px;flex-shrink:0;border-radius:4px}
.info{flex:1;min-width:0}
.top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.name{font-size:17px;font-weight:700;color:#1e293b}
.ct{font-size:13px;color:#64748b}
.bar{height:20px;background:#e2e8f0;border-radius:10px;overflow:hidden;position:relative}
.fill{height:100%;border-radius:10px}
.c0{background:linear-gradient(90deg,#22c55e,#16a34a)}
.c1{background:linear-gradient(90deg,#f59e0b,#d97706)}
.c2{background:linear-gradient(90deg,#3b82f6,#2563eb)}
.c3{background:linear-gradient(90deg,#ef4444,#dc2626)}
.bt{position:absolute;top:0;left:50%;transform:translateX(-50%);line-height:20px;font-size:11px;color:#fff;font-weight:600;text-shadow:0 0 3px rgba(0,0,0,.5)}
.footer{text-align:center;padding:10px 28px 20px;color:#94a3b8;font-size:12px}
</style>
</head>
<body>
<div class="card">
  <div class="head">📊 物品容量</div>
  <div class="body">
    <div class="block">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/carrot.png" onerror="this.style.background='#e0e0e0'">
      <div class="info">
        <div class="top"><span class="name">胡萝卜</span><span class="ct">3,840个 (2盒+384)</span></div>
        <div class="bar"><div class="fill c0" style="width:1.85%"></div><div class="bt">1.85%</div></div>
      </div>
    </div>
    <div class="block">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/diamond.png" onerror="this.style.background='#e0e0e0'">
      <div class="info">
        <div class="top"><span class="name">钻石</span><span class="ct">756个</span></div>
        <div class="bar"><div class="fill c1" style="width:0.36%"></div><div class="bt">0.36%</div></div>
      </div>
    </div>
    <div class="block">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/iron_ingot.png" onerror="this.style.background='#e0e0e0'">
      <div class="info">
        <div class="top"><span class="name">铁锭</span><span class="ct">12,544个 (7盒+448)</span></div>
        <div class="bar"><div class="fill c2" style="width:6.05%"></div><div class="bt">6.05%</div></div>
      </div>
    </div>
    <div class="block">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/gold_ingot.png" onerror="this.style.background='#e0e0e0'">
      <div class="info">
        <div class="top"><span class="name">金锭</span><span class="ct">2,560个 (1盒+832)</span></div>
        <div class="bar"><div class="fill c3" style="width:1.23%"></div><div class="bt">1.23%</div></div>
      </div>
    </div>
  </div>
  <div class="footer">QQScan &bull; 扫描 #胡萝卜 &bull; 耗时 1.2s &bull; 容器 120个 &bull; 总容积 207,360格</div>
</div>
</body>
</html>
