<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Microsoft YaHei',sans-serif;padding:40px;display:flex;justify-content:center}
.card{width:640px;background:#fff;border:2px solid #e0e0e0;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.head{background:#18181b;color:#fff;text-align:center;padding:20px;font-size:28px;font-weight:900;letter-spacing:6px;display:flex;align-items:center;justify-content:center;gap:10px}
.head .dot{width:8px;height:8px;background:#22c55e;border-radius:50%}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:20px}
.cell{text-align:center;padding:10px 4px;background:#fafafa;border-radius:10px;border:1px solid #f0f0f0}
.icon{width:48px;height:48px;image-rendering:pixelated;margin:0 auto 6px;display:block;border-radius:4px}
.name{font-size:12px;color:#3f3f46;font-weight:600;line-height:1.3}
.count{font-size:11px;color:#71717a;margin-top:2px}
.footer{text-align:center;padding:10px 24px 18px;color:#a1a1aa;font-size:12px;border-top:1px solid #f4f4f5}
</style>
</head>
<body>
<div class="card">
  <div class="head"><span class="dot"></span>物品种类及数量<span class="dot"></span></div>
  <div class="grid">
    <div class="cell">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/carrot.png" onerror="this.style.background='#e0e0e0'">
      <div class="name">胡萝卜</div>
      <div class="count">3,840个<br>(2盒+384)</div>
    </div>
    <div class="cell">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/iron_ingot.png" onerror="this.style.background='#e0e0e0'">
      <div class="name">铁锭</div>
      <div class="count">12,544个<br>(7盒+448)</div>
    </div>
    <div class="cell">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/diamond.png" onerror="this.style.background='#e0e0e0'">
      <div class="name">钻石</div>
      <div class="count">756个</div>
    </div>
    <div class="cell">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/gold_ingot.png" onerror="this.style.background='#e0e0e0'">
      <div class="name">金锭</div>
      <div class="count">2,560个<br>(1盒+832)</div>
    </div>
    <div class="cell">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/emerald.png" onerror="this.style.background='#e0e0e0'">
      <div class="name">绿宝石</div>
      <div class="count">128个</div>
    </div>
    <div class="cell">
      <img class="icon" src="https://assets.mcassets.cloud/1.21.1/icons/items/redstone.png" onerror="this.style.background='#e0e0e0'">
      <div class="name">红石粉</div>
      <div class="count">4,800个<br>(2盒+1344)</div>
    </div>
  </div>
  <div class="footer">QQScan · 扫描 #仓库 · 120容器 · 耗时1.2s</div>
</div>
</body>
</html>
